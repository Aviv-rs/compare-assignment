services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --skip-ssl
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppass
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ../:/var/www/html/wp-content/plugins/compare-assignment

  wp-cli:
    image: wordpress:cli
    depends_on:
      - wordpress
      - db
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ../:/var/www/html/wp-content/plugins/compare-assignment
      - ./setup.sh:/usr/local/bin/setup.sh
    entrypoint: ["/bin/sh", "/usr/local/bin/setup.sh"]

volumes:
  db_data:
  wp_data:
